<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //数组中新增了map和reduce方法
        //map():接受一个函数，将原数组的所有元素用这个函数处理后放入新数组返回
        let arr = ['1','20', '-5', '3'];
        arr = arr.map((item)=>{
            return item*2
        })
        console.log(arr);
        
        //reduce() 为数组中的每一个元素依次返回回调函数，不包括数组中被删除或从未被赋值的元素
        let result = arr.reduce((a,b)=>{
            console.log("上一次处理后："+a);
            console.log("当前正在处理："+b);
            return a+b;
        },100);
        console.log(result);
    </script>
</body>
</html>
