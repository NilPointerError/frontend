    <script>
        // es6以前，我们无法给一个函数参数设置默认值，只能采用变通写法
        function add(a, b) {
            b = b || 1;
            return a + b;
        }
        // 传一个函数
        console.log(add(10));

        // 现在可以给出默认值
        function add2(a, b=1) {
            return a+b;
        }
        console.log(add2(20))


        //2）不定参数
        function fun(... values) {
            console.log(values.length)
        }
        fun(1, 2)
        fun(1,2,3,4)

        const person = {
            name:"jack",
            age: 21,
            language: ['java','js','css']
        }
        function hello(person) {
            console.log("hello," + person.name)
        }
        var hello2 = (param) => console.log("hello," + param.name);
        hello2(person);
        // 箭头函数+解构
        var hello2 = ({name}) => console.log("hello," + name);
        hello2(person);
